<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320" fill="none">

  <!-- Black rounded square behind moon and stars -->
  <rect x="32" y="32" width="256" height="256" rx="24" ry="24" fill="#0A0A14"/>

  <!-- Mask that subtracts the cutout circle -->
  <mask id="crescent-mask">
    <rect x="0" y="0" width="320" height="320" fill="white"/>
    <circle cx="182" cy="146" r="70" fill="black"/>
  </mask>

  <!-- Crescent moon (centered) -->
  <g>
    <circle cx="160" cy="160" r="86" fill="#F7A1E8" mask="url(#crescent-mask)"/>
  </g>

  <!-- Main star (centered relative to group) -->
  <path d="M221 73
           L229 97
           L253 105
           L229 113
           L221 137
           L213 113
           L189 105
           L213 97 Z"
        fill="#8B3DFF"/>

  <!-- Small star (centered relative to group) -->
  <path d="M180 145
           L184 154
           L193 157
           L184 160
           L180 169
           L176 160
           L167 157
           L176 154 Z"
        fill="#F38AEF"/>

</svg>
